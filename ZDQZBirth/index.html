<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日查询系统 | ZDQZ</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎂 青志生日查询系统</h1>
            <p>输入信息，查找那份专属于青志er的惊喜</p>
        </header>

        <section class="filter-card">
            <!-- 1. 选择届别 (改为三个并排按钮) -->
            <div class="filter-group">
                <label>1. 选择届别</label>
                <div class="radio-group" id="yearBtnGroup">
                    <button class="btn-toggle active" data-year="全部">全部</button>
                    <button class="btn-toggle" data-year="24">2024年</button>
                    <button class="btn-toggle" data-year="25">2025年</button>
                </div>
            </div>

            <!-- 2. 选择月份 (取消了隐藏逻辑，直接常驻显示) -->
            <div class="filter-group">
                <label>2. 选择月份 (可多选，不选则查看全年)</label>
                <div id="monthGrid" class="month-grid"></div>
            </div>

            <!-- 3. 选择部门 -->
            <div class="filter-group">
                <label>3. 选择部门</label>
                <select id="deptSelect">
                    <option value="全部">全部部门</option>
                    <option value="队长团">队长团</option>
                    <option value="人力资源部">人力资源部</option>
                    <option value="新闻宣传部">新闻宣传部</option>
                    <option value="联络推广部">联络推广部</option>
                    <option value="培训拓展部">培训拓展部</option>
                    <option value="实践调研部">实践调研部</option>
                    <option value="综合管理部">综合管理部</option>
                    <option value="项目策划部">项目策划部</option>
                </select>
            </div>

            <!-- 4. 昵称关键词 -->
            <div class="filter-group">
                <label>4. 昵称关键词 (可选)</label>
                <input type="text" id="nameInput" placeholder="输入昵称关键词...">
            </div>

            <button id="searchBtn" class="btn-primary">立即查询</button>
        </section>

        <!-- 结果统计与展示区 -->
        <section id="resultStats" class="stats-text"></section>
        <section id="resultsContainer" class="results-grid">
            <div class="empty-state">等待查询中...</div>
        </section>
    </div>

    <!-- 详情弹窗 -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- 引入 JS 脚本 -->
    <script src="js/main.js"></script>
</body>
</html>
