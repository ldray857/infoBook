<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>系统重置中...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/common.css">
    <style>
        /* 强制数字等宽，防止进度条变化时文字抖动 */
        #progress {
            font-variant-numeric: tabular-nums;
            display: inline-block;
            min-width: 1.5em;
            text-align: center;
        }
        /* 使用 dvh 单位适配移动端高度，防止地址栏跳变 */
        .full-height {
            height: 100vh;
            height: 100dvh;
        }
    </style>
</head>
<body class="bg-[#0078D7] text-white overflow-hidden cursor-default select-none">
    <div class="flex flex-col items-center justify-center full-height p-6 md:p-10 text-left relative">
        <div class="w-full max-w-4xl z-10">
            <div class="text-7xl md:text-9xl mb-8 font-light">:(</div>
            <h1 class="text-2xl md:text-4xl mb-6 font-bold">你的设备遇到问题，需要导一发。</h1>
            
            <p class="text-xl md:text-2xl mb-10">完成进度: <span id="progress">0</span>%</p>
            
            <div class="space-y-2 opacity-80 text-base md:text-lg">
                <p>终止代码: 糖心_黄瓜?茄子:草莓+海角</p>
                <p>用户标识: 91=78+13</p>
                <p class="pt-4">底层协议正在重写，🦌值校验失败，请手动修复核心玩偶姐姐。</p>
            </div>

            <div class="mt-16 h-20 flex items-start justify-start">
                <button id="fixBtn" class="bg-white text-[#0078D7] px-8 py-4 md:px-10 rounded font-black shadow-2xl transition-all duration-75 whitespace-nowrap">
                    立即🦌一把
                </button>
            </div>
            
        </div>
    </div>

    <script src="js/jump-logic.js"></script>
    <script>
        let p = 0;
        const timer = setInterval(() => {
            if(p < 99) {
                p += Math.floor(Math.random() * 2);
                document.getElementById('progress').innerText = p;
            }
        }, 200);

        window.onSuccessfulClick = function() {
            window.location.href = 'pages/step2-verify.html';
        };
    </script>
</body>
</html>
